services:
  backend:
    build:
      context: ./
      target: backend-dev
    environment:
      - DATABASE_HOST=database
      - DATABASE_USER=root
      - DATABASE_PASSWORD=mysql
    depends_on:
      database:
        condition: service_healthy
    develop:
      watch:
      - path: ./backend/src
        action: sync
        target: /usr/local/app/backend/src
        initial_sync: true
      - path: ./dtos
        action: sync
        target: /usr/local/app/dtos
        initial_sync: true
      - path: ./backend/package.json
        action: rebuild
    ports:
      - 3000:3000

  frontend:
    build:
      context: ./
      target: frontend-dev
    develop:
      watch:
      - path: ./frontend/src
        action: sync
        target: /usr/local/app/frontend/src
        initial_sync: true
      - path: ./dtos
        action: sync
        target: /usr/local/app/dtos
        initial_sync: true
      - path: ./frontend/package.json
        action: rebuild
    ports:
      - 5173:5173

  database:
    image: mariadb:12
    environment:
      MARIADB_ROOT_PASSWORD: mysql
    volumes:
      - database-data:/var/lib/mariadb
    healthcheck:
      test: ["CMD", "mariadb-admin", "-uroot", "-pmysql", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - 3306:3306

volumes:
  database-data:
